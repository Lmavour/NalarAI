    <!-- SEO: JSON-LD Structured Data — FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Apa itu NalarAI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NalarAI adalah tutor AI pembelajaran aktif yang mendorong siswa berpikir kritis melalui metode sokratik. Alih-alih langsung memberi jawaban, NalarAI membimbing kamu menemukan jawaban sendiri melalui pertanyaan, tantangan, dan dialog interaktif."
          }
        },
        {
          "@type": "Question",
          "name": "Apakah NalarAI gratis?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ya, NalarAI sepenuhnya gratis dan tidak memerlukan registrasi. Kamu bisa langsung mulai belajar tanpa membuat akun."
          }
        },
        {
          "@type": "Question",
          "name": "Apa itu metode sokratik dalam NalarAI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Metode sokratik adalah pendekatan pembelajaran di mana tutor tidak langsung memberi jawaban, tapi bertanya dan menantang siswa untuk menemukan jawaban sendiri. NalarAI menggunakan metode ini untuk membangun pemahaman mendalam, bukan sekadar menghafal."
          }
        },
        {
          "@type": "Question",
          "name": "Apa saja fitur interaksi aktif di NalarAI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NalarAI memiliki tiga mode interaksi aktif: Quick Quiz (uji konsep dengan pilihan ganda), Gap Fill (melengkapi kalimat untuk memperkuat ingatan), dan Tantangan Nalar / Paraphrase (baca teks, tutup, jelaskan ulang dengan kata sendiri sebagai bukti pemahaman)."
          }
        },
        {
          "@type": "Question",
          "name": "Topik apa yang bisa saya pelajari dengan NalarAI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NalarAI bisa membimbing di topik apa pun — dari sains seperti fotosintesis dan cara kerja atom, hingga sejarah, filsafat, matematika, dan lain-lain. Kamu hanya perlu mengetik topik atau pertanyaan, dan NalarAI akan memulai dialog sokratik."
          }
        },
        {
          "@type": "Question",
          "name": "Bagaimana sistem gamifikasi NalarAI bekerja?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NalarAI menggunakan sistem XP (experience points), streak (jawaban benar berturut-turut), dan hearts (nyawa). Selesaikan tantangan dengan streak tinggi untuk meraih Sertifikat Nalar — bukti visual pencapaian yang bisa dibagikan."
          }
        }
      ]
    }
